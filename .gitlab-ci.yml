stages:
  - build
  - test

build:
  stage: build
  script:
    - dotnet build Vauchi.sln -c Release
  artifacts:
    paths:
      - Vauchi/bin/Release/
  tags: [windows]

test:
  stage: test
  script:
    - dotnet test Vauchi.Tests/Vauchi.Tests.csproj
  tags: [windows]
