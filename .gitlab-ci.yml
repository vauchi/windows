include:
  - template: Security/SAST.gitlab-ci.yml
  - template: Security/Secret-Detection.gitlab-ci.yml
  - project: 'vauchi/scripts'
    ref: main
    file:
      - '/ci-templates/design-drift.yml'
      - '/ci-templates/removed-symbols.yml'
      - '/ci-templates/badges.yml'
      - '/ci-templates/github-mirror.yml'
      - '/ci-templates/vrt-upload.yml'

variables:
  SAST_EXCLUDED_PATHS: "bin/, obj/, packages/"
  SECRET_DETECTION_EXCLUDED_PATHS: "bin/, obj/, packages/"
  SAST_ANALYZER_IMAGE_TAG: "5"

stages:
  - lint
  - build
  - test
  - security
  - deploy

# Download and verify CABI native library from core's package registry.
# Requires CI variable: VAUCHI_CORE_PROJECT_ID (core's GitLab project ID)
download:cabi:
  stage: build
  script:
    - |
      $config = Get-Content cabi-version.json | ConvertFrom-Json
      if ($config.version -eq "0.0.0") {
        Write-Host "CABI version is placeholder (0.0.0) — skipping download"
        exit 0
      }

      # Skip if DLL already matches expected hash
      if (Test-Path cabi/vauchi_cabi.dll) {
        $actual = (Get-FileHash cabi/vauchi_cabi.dll -Algorithm SHA256).Hash.ToLower()
        if ($actual -eq $config.sha256) {
          Write-Host "CABI DLL already up to date ($($config.version))"
          exit 0
        }
      }

      New-Item -ItemType Directory -Force -Path cabi | Out-Null
      $base = "$env:CI_API_V4_URL/projects/$env:VAUCHI_CORE_PROJECT_ID/packages/generic/vauchi-cabi-windows/$($config.version)"
      $headers = @{ "JOB-TOKEN" = $env:CI_JOB_TOKEN }

      Write-Host "Downloading vauchi_cabi.dll v$($config.version)..."
      Invoke-WebRequest -Uri "$base/vauchi_cabi.dll" -Headers $headers -OutFile cabi/vauchi_cabi.dll
      Invoke-WebRequest -Uri "$base/vauchi_cabi.dll.sha256" -Headers $headers -OutFile cabi/vauchi_cabi.dll.sha256
      Invoke-WebRequest -Uri "$base/vauchi_cabi.dll.sha256.bundle" -Headers $headers -OutFile cabi/vauchi_cabi.dll.sha256.bundle

      # Install cosign
      $COSIGN_VERSION = "v3.0.5"
      $COSIGN_URL = "https://github.com/sigstore/cosign/releases/download/$COSIGN_VERSION/cosign-windows-amd64.exe"
      Invoke-WebRequest -Uri $COSIGN_URL -OutFile cosign.exe

      # Verify cosign signature
      Write-Host "Verifying cosign signature..."
      & .\cosign.exe verify-blob --key cosign.pub --bundle cabi/vauchi_cabi.dll.sha256.bundle cabi/vauchi_cabi.dll.sha256
      if ($LASTEXITCODE -ne 0) {
        Write-Error "Cosign verification FAILED"
        exit 1
      }
      Write-Host "Cosign signature verified"

      # Verify SHA-256
      $actual = (Get-FileHash cabi/vauchi_cabi.dll -Algorithm SHA256).Hash.ToLower()
      if ($actual -ne $config.sha256) {
        Write-Error "SHA-256 mismatch: expected $($config.sha256), got $actual"
        exit 1
      }
      Write-Host "SHA-256 verified: $actual"
  artifacts:
    paths:
      - cabi/vauchi_cabi.dll
    expire_in: 1 day
  tags: [saas-windows-medium-amd64]

build:app:
  stage: build
  needs:
    - job: download:cabi
      artifacts: true
  script:
    - dotnet build Vauchi.sln -c Release
  artifacts:
    paths:
      - Vauchi/bin/Release/
  tags: [saas-windows-medium-amd64]

test:unit:
  stage: test
  needs:
    - job: build:app
      artifacts: true
  script:
    - dotnet test Vauchi.UnitTests/Vauchi.UnitTests.csproj
  tags: [saas-windows-medium-amd64]

# ============================================================
# Security Stage
# ============================================================

semgrep-sast:
  tags: [docker]
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        compare_to: refs/heads/$CI_DEFAULT_BRANCH
        paths:
          - "**/*.cs"
          - "**/*.xaml"
          - ".gitlab-ci.yml"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_PIPELINE_SOURCE == "schedule"

secret_detection:
  tags: [docker]
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# Design drift: verify all design-spec components are implemented
test:a11y:
  stage: test
  script:
    - dotnet test Vauchi.Tests/Vauchi.Tests.csproj --filter "FullyQualifiedName~AccessibilityTests"
  tags: [saas-windows-medium-amd64]
  when: manual

check:design-drift:
  extends: .design-drift-job
  variables:
    DESIGN_DRIFT_COMPONENT_DIR: "Vauchi/CoreUI/Components"
    DESIGN_DRIFT_FILE_EXT: ".xaml.cs"
    DESIGN_DRIFT_FILE_SUFFIX: "Component"
    DESIGN_DRIFT_CASE: "pascal"

# Removed symbols: detect stale references to removed features
check:removed-symbols:
  extends: .removed-symbols-job
  variables:
    SEARCH_DIRS: "Vauchi/"

# ============================================================
# Deploy Stage — Badge Pages
# ============================================================

pages:
  extends: .badges-pages

github-mirror:
  extends: .github-mirror
