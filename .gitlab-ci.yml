include:
  - template: Security/SAST.gitlab-ci.yml
  - template: Security/Secret-Detection.gitlab-ci.yml
  - project: 'vauchi/scripts'
    ref: main
    file:
      - '/ci-templates/design-drift.yml'
      - '/ci-templates/removed-symbols.yml'
      - '/ci-templates/badges.yml'
      - '/ci-templates/github-mirror.yml'
      - '/ci-templates/vrt-upload.yml'

variables:
  SAST_EXCLUDED_PATHS: "bin/, obj/, packages/"
  SECRET_DETECTION_EXCLUDED_PATHS: "bin/, obj/, packages/"
  SAST_ANALYZER_IMAGE_TAG: "5"

stages:
  - lint
  - build
  - test
  - security
  - deploy

workflow:
  auto_cancel:
    on_new_commit: interruptible
    on_job_failure: all
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH && $CI_OPEN_MERGE_REQUESTS
      when: never
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_TAG
    - if: $CI_PIPELINE_SOURCE == "schedule"
    - if: $CI_PIPELINE_SOURCE == "pipeline" || $CI_PIPELINE_SOURCE == "trigger"

default:
  interruptible: true

# Download and verify CABI native library from core's package registry.
# Requires CI variable: VAUCHI_CORE_PROJECT_ID (core's GitLab project ID)
download:cabi:
  stage: build
  script:
    - |
      $config = Get-Content cabi-version.json | ConvertFrom-Json
      if ($config.version -eq "0.0.0") {
        Write-Host "CABI version is placeholder (0.0.0) — skipping download"
        exit 0
      }

      # Skip if DLL already matches expected hash
      if (Test-Path cabi/vauchi_cabi.dll) {
        $actual = (Get-FileHash cabi/vauchi_cabi.dll -Algorithm SHA256).Hash.ToLower()
        if ($actual -eq $config.sha256) {
          Write-Host "CABI DLL already up to date ($($config.version))"
          exit 0
        }
      }

      New-Item -ItemType Directory -Force -Path cabi | Out-Null
      # Hardcoded core project ID (77874344) — eliminates dependency on
      # VAUCHI_CORE_PROJECT_ID CI variable which is protected (empty on MR pipelines).
      $base = "$env:CI_API_V4_URL/projects/77874344/packages/generic/vauchi-cabi-windows/$($config.version)"

      Write-Host "Downloading vauchi_cabi.dll v$($config.version)..."
      Write-Host "URL base: $base"
      # Use curl.exe with HTTP Basic Auth (gitlab-ci-token:<JOB_TOKEN>).
      # JOB-TOKEN header triggers 308 redirect to CDN which may 404;
      # Basic Auth avoids the CDN redirect path entirely.
      $curlAuth = "gitlab-ci-token:$env:CI_JOB_TOKEN"
      foreach ($file in @("vauchi_cabi.dll", "vauchi_cabi.dll.sha256", "vauchi_cabi.dll.sha256.bundle")) {
        $attempt = 0
        $ok = $false
        while ($attempt -lt 3 -and -not $ok) {
          $attempt++
          Write-Host "  $file (attempt $attempt)..."
          curl.exe -fSL -u $curlAuth --retry 2 -o "cabi/$file" "$base/$file"
          if ($LASTEXITCODE -eq 0) { $ok = $true } else {
            Write-Host "  Failed (exit $LASTEXITCODE), retrying..."
            Start-Sleep -Seconds 2
          }
        }
        if (-not $ok) {
          Write-Error "Failed to download $file after 3 attempts"
          exit 1
        }
      }

      # Install cosign
      $COSIGN_VERSION = "v3.0.5"
      $COSIGN_URL = "https://github.com/sigstore/cosign/releases/download/$COSIGN_VERSION/cosign-windows-amd64.exe"
      curl.exe -fSL --retry 2 -o cosign.exe $COSIGN_URL

      # Verify cosign signature
      Write-Host "Verifying cosign signature..."
      & .\cosign.exe verify-blob --key cosign.pub --bundle cabi/vauchi_cabi.dll.sha256.bundle cabi/vauchi_cabi.dll.sha256
      if ($LASTEXITCODE -ne 0) {
        Write-Error "Cosign verification FAILED"
        exit 1
      }
      Write-Host "Cosign signature verified"

      # Verify SHA-256
      $actual = (Get-FileHash cabi/vauchi_cabi.dll -Algorithm SHA256).Hash.ToLower()
      if ($actual -ne $config.sha256) {
        Write-Error "SHA-256 mismatch: expected $($config.sha256), got $actual"
        exit 1
      }
      Write-Host "SHA-256 verified: $actual"
  artifacts:
    paths:
      - cabi/vauchi_cabi.dll
    expire_in: 1 day
  tags: [saas-windows-medium-amd64]

build:app:
  stage: build
  needs:
    - job: download:cabi
      artifacts: true
  script:
    # PRI tooling disabled: SaaS runners lack Visual Studio's
    # Microsoft.Build.Packaging.Pri.Tasks.dll. Unpackaged WinUI apps
    # don't need PRI at runtime (XAML loads from loose .xbf files).
    - dotnet build Vauchi.sln -c Release -p:EnableCoreMrtTooling=false -p:AppxGeneratePriEnabled=false
    - |
      # Report binary sizes for Grafana tracking
      $outDir = "Vauchi\bin\x64\Release\net8.0-windows10.0.22621.0\win-x64"
      $exe = Get-Item "$outDir\Vauchi.exe" -ErrorAction SilentlyContinue
      $dll = Get-Item "$outDir\Vauchi.dll" -ErrorAction SilentlyContinue
      $cabi = Get-Item "cabi\vauchi_cabi.dll" -ErrorAction SilentlyContinue
      $metrics = @{}
      if ($exe) { $metrics["vauchi_binary_size_bytes{component=`"exe`",platform=`"windows`"}"] = $exe.Length }
      if ($dll) { $metrics["vauchi_binary_size_bytes{component=`"app_dll`",platform=`"windows`"}"] = $dll.Length }
      if ($cabi) { $metrics["vauchi_binary_size_bytes{component=`"cabi_dll`",platform=`"windows`"}"] = $cabi.Length }
      # Print to job log + save as artifact
      $promText = ($metrics.GetEnumerator() | ForEach-Object { "$($_.Key) $($_.Value)" }) -join "`n"
      Write-Host $promText
      $metrics | ConvertTo-Json | Set-Content metrics.json
      # Push to Prometheus pushgateway (if configured via CI variable)
      if ($env:PUSHGATEWAY_URL) {
        try {
          Invoke-RestMethod -Uri "$env:PUSHGATEWAY_URL/metrics/job/vauchi_binary_size/platform/windows" `
            -Method Post -Body $promText -ContentType "text/plain" -ErrorAction Stop
          Write-Host "[metrics] Pushed to pushgateway"
        } catch {
          Write-Warning "[metrics] Pushgateway push failed (advisory): $_"
        }
      }
  artifacts:
    paths:
      - Vauchi/bin/x64/Release/
      - metrics.json
  tags: [saas-windows-medium-amd64]

test:unit:
  stage: test
  needs:
    - job: build:app
      artifacts: true
  script:
    - dotnet test Vauchi.UnitTests/Vauchi.UnitTests.csproj --logger "junit;LogFilePath=../../test-results/unit.xml"
  artifacts:
    when: always
    reports:
      junit: test-results/unit.xml
  tags: [saas-windows-medium-amd64]

# Coverage: dotnet test with Coverlet collector (main merges only).
# Produces Cobertura XML for GitLab MR annotations and pushes metrics
# to Grafana Pushgateway.
coverage:unit:
  stage: test
  needs:
    - job: build:app
      artifacts: true
  script:
    - |
      dotnet test Vauchi.UnitTests/Vauchi.UnitTests.csproj `
        --collect:"XPlat Code Coverage" `
        --results-directory coverage-results `
        --logger "junit;LogFilePath=../../test-results/coverage-unit.xml"
    - |
      # Find Cobertura XML (Coverlet outputs to a GUID subdirectory)
      $coberturaFile = Get-ChildItem -Path coverage-results -Recurse -Filter "coverage.cobertura.xml" | Select-Object -First 1
      if (-not $coberturaFile) {
        Write-Error "No Cobertura XML found"
        exit 1
      }
      Copy-Item $coberturaFile.FullName -Destination cobertura.xml
    - |
      # Extract coverage percentage for GitLab regex
      [xml]$cob = Get-Content cobertura.xml
      $lineRate = [double]$cob.coverage.'line-rate'
      $pct = [math]::Round($lineRate * 100, 2)
      Write-Host "Line Coverage: ${pct}%"
    - |
      # Push to Grafana Pushgateway (best-effort)
      $linesValid = $cob.coverage.'lines-valid'
      $linesCovered = $cob.coverage.'lines-covered'
      $metrics = @(
        "vauchi_eng_coverage_percent{repo=`"windows`"} $pct"
        "vauchi_eng_coverage_lines_valid{repo=`"windows`"} $linesValid"
        "vauchi_eng_coverage_lines_covered{repo=`"windows`"} $linesCovered"
      ) -join "`n"
      if ($env:PUSHGATEWAY_URL) {
        try {
          Invoke-RestMethod -Uri "$env:PUSHGATEWAY_URL/metrics/job/vauchi_coverage/repo/windows" `
            -Method Post -Body $metrics -ContentType "text/plain" -ErrorAction Stop
          Write-Host "[metrics] Coverage pushed to pushgateway"
        } catch {
          Write-Warning "[metrics] Pushgateway push failed (advisory): $_"
        }
      }
  coverage: '/Line Coverage:\s+(\d+(?:\.\d+)?%)/'
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: cobertura.xml
    paths:
      - cobertura.xml
    expire_in: 1 week
  tags: [saas-windows-medium-amd64]
  rules:
    - if: $CI_PIPELINE_SOURCE == "pipeline" || $CI_PIPELINE_SOURCE == "trigger" || $CI_PIPELINE_SOURCE == "api"
      when: never
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_PIPELINE_SOURCE == "schedule"

# ============================================================
# Security Stage
# ============================================================

semgrep-sast:
  tags: [docker]
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        compare_to: refs/heads/$CI_DEFAULT_BRANCH
        paths:
          - "**/*.cs"
          - "**/*.xaml"
          - ".gitlab-ci.yml"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_PIPELINE_SOURCE == "schedule"

secret_detection:
  tags: [docker]
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# Visual snapshot tests — capture each screen, compare against baselines.
# Requires Debug build (--reset-for-testing) and desktop session.
# Manual: SaaS runners may lack a desktop session for UI rendering.
test:snapshots:
  stage: test
  needs:
    - job: download:cabi
      artifacts: true
  variables:
    VRT_PLATFORM: windows
    VRT_SCREENSHOT_DIR: tests/snapshots/actual
  script:
    - dotnet build Vauchi/Vauchi.csproj -c Debug -p:Platform=x64 -p:EnableCoreMrtTooling=false -p:AppxGeneratePriEnabled=false
    - |
      $debugDir = "Vauchi\bin\x64\Debug\net8.0-windows10.0.22621.0\win-x64"
      Copy-Item cabi/vauchi_cabi.dll -Destination $debugDir -Force
    - powershell -ExecutionPolicy Bypass -File tests/capture-snapshots.ps1
  after_script:
    - !reference [.vrt-upload-script, script]
  artifacts:
    when: always
    paths:
      - tests/snapshots/actual/
    expire_in: 7 days
  tags: [saas-windows-medium-amd64]
  when: manual
  allow_failure: true

# Record new baselines — manual job, commits via PROJECT_ACCESS_TOKEN.
test:snapshots:record:
  stage: test
  needs:
    - job: download:cabi
      artifacts: true
  script:
    - dotnet build Vauchi/Vauchi.csproj -c Debug -p:Platform=x64 -p:EnableCoreMrtTooling=false -p:AppxGeneratePriEnabled=false
    - |
      $debugDir = "Vauchi\bin\x64\Debug\net8.0-windows10.0.22621.0\win-x64"
      Copy-Item cabi/vauchi_cabi.dll -Destination $debugDir -Force
    - powershell -ExecutionPolicy Bypass -File tests/capture-snapshots.ps1 -UpdateBaselines
    - |
      git config user.name "vauchi-bot"
      git config user.email "bot@vauchi.app"
      git add tests/snapshots/baseline/*.png
      $changes = git diff --cached --name-only
      if ($changes) {
        git commit -m "test: update Windows snapshot baselines [skip ci]"
        git push "https://project-access-token:$env:PROJECT_ACCESS_TOKEN@gitlab.com/vauchi/windows.git" HEAD:$env:CI_COMMIT_REF_NAME
      } else {
        Write-Host "No baseline changes to commit"
      }
  tags: [saas-windows-medium-amd64]
  when: manual
  allow_failure: true

# Design drift: verify all design-spec components are implemented
test:a11y:
  stage: test
  script:
    - dotnet test Vauchi.Tests/Vauchi.Tests.csproj --filter "FullyQualifiedName~AccessibilityTests"
  tags: [saas-windows-medium-amd64]
  when: manual

check:design-drift:
  extends: .design-drift-job
  variables:
    DESIGN_DRIFT_COMPONENT_DIR: "Vauchi/CoreUI/Components"
    DESIGN_DRIFT_FILE_EXT: ".xaml.cs"
    DESIGN_DRIFT_FILE_SUFFIX: "Component"
    DESIGN_DRIFT_CASE: "pascal"

# Removed symbols: detect stale references to removed features
check:removed-symbols:
  extends: .removed-symbols-job
  variables:
    SEARCH_DIRS: "Vauchi/"

# Design token drift: warn on named Colors.* / Color.FromArgb / hex
# string literals that bypass Tokens.cs and the theme. Script lives in
# vauchi/scripts — fetched via API to avoid duplicating it here.
# Current baseline is non-zero (see §5 of
# `2026-04-16-frontend-pure-renderer-violations`) so this is a warning
# gate; flip to `--strict` once the three different reds are unified.
check:design-tokens:
  stage: lint
  image: alpine:3.21
  tags: [docker]
  needs: []
  allow_failure: true
  before_script:
    - apk add --no-cache bash findutils grep curl
  script:
    - |
      curl --silent --fail \
        "${CI_API_V4_URL}/projects/vauchi%2Fscripts/repository/files/scripts%2Fcheck-design-tokens.sh/raw?ref=main" \
        -o check-design-tokens.sh
      chmod +x check-design-tokens.sh
    - ./check-design-tokens.sh Vauchi/
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        compare_to: refs/heads/main
        paths:
          - "**/*.cs"
          - "**/*.xaml"
          - ".gitlab-ci.yml"

# ============================================================
# Deploy Stage — Badge Pages
# ============================================================

package:msix:
  stage: deploy
  tags: [saas-windows-medium-amd64]
  needs: ["build:app"]
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/
  script:
    - $VERSION = "$env:CI_COMMIT_TAG" -replace '^v', ''
    - >
      dotnet publish Vauchi.sln -c Release
      -p:Platform=x64
      -o publish-output
    - >
      & "${env:ProgramFiles(x86)}\Windows Kits\10\bin\10.0.22621.0\x64\MakeAppx.exe"
      pack /d publish-output /p "Vauchi-${VERSION}.msix" /nv
  artifacts:
    paths:
      - "Vauchi-*.msix"
    expire_in: 1 week

pages:
  extends: .badges-pages

github-mirror:
  extends: .github-mirror
