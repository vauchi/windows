version = 1
SPDX-PackageName = "vauchi-windows"
SPDX-PackageSupplier = "Mattia Egloff <mattia.egloff@pm.me>"

# License files
[[annotations]]
path = ["LICENSES/**"]
SPDX-FileCopyrightText = "Free Software Foundation"
SPDX-License-Identifier = "GPL-3.0-or-later"

# Git and editor config files
[[annotations]]
path = [".gitignore", "**/.gitignore", "**/.gitkeep"]
SPDX-FileCopyrightText = "2026 Mattia Egloff <mattia.egloff@pm.me>"
SPDX-License-Identifier = "GPL-3.0-or-later"

# JSON data files (can't have comments)
[[annotations]]
path = ["**/*.json"]
SPDX-FileCopyrightText = "2026 Mattia Egloff <mattia.egloff@pm.me>"
SPDX-License-Identifier = "GPL-3.0-or-later"

# Cosign public key (binary, no comment syntax)
[[annotations]]
path = ["cosign.pub"]
SPDX-FileCopyrightText = "2026 Mattia Egloff <mattia.egloff@pm.me>"
SPDX-License-Identifier = "GPL-3.0-or-later"

# Visual Studio solution files
[[annotations]]
path = ["**/*.sln"]
SPDX-FileCopyrightText = "2026 Mattia Egloff <mattia.egloff@pm.me>"
SPDX-License-Identifier = "GPL-3.0-or-later"
